<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add cash</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="w-full">
<div th:insert="/header :: header"></div>

<main>
    <h1 class="text-center text-4xl font-mono">Add Cash</h1>
    <div class="mx-auto mt-20 grid max-w-5xl gap-10 lg:grid-cols-2">
    <div class="rounded-xl bg-white/90 backdrop-blur-md shadow-xl border border-white/40 overflow-hidden flex flex-col h-full">


        <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
            <h2 class="text-lg font-semibold text-gray-800">Credit your account with a credit card</h2>
            <span class="text-sm px-2 py-1 rounded-md bg-emerald-100 text-emerald-700">
      Secure
    </span>
        </div>

        <!-- Content -->
        <div class="px-6 py-4 text-gray-600 flex-1">

                <form method="post" th:action="@{/app/add-cash}" th:object="${addCashForm}" class="mb-4" id="payment-form" >
                    <label for="amount">Amount to fund</label>
                    <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                     $
                     </span>
                        <input id="amount"
                               type="number"
                               required
                               placeholder="0.00"
                               th:field="*{amount}"
                               class="pl-8 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none border w-[30%] block rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">

                    </div>
                </form>


            <label for="card-number">Card Holder Name</label>
            <div>
                <input id="card-number" type="text"
                       placeholder="Bobby Bob"
                       required
                       class="border w-[80%] block rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">
            </div>
            <div class="mt-4">
                <label for="card-number">Card Number</label>
                <div class="flex gap-4">
                    <input type="text"
                           required
                           placeholder="3123 2331 4543 0531"
                           maxlength="16"
                           class=" border w-[80%] block rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">
                    <img th:src="@{/assets/credit-card-svgrepo-com.svg}" class="h-[40px] w-[40px]">

                </div>
            </div>


            <div class="flex gap-2 mx-auto mt-4">
                <div>
                    <label for="expiry">Expiration Date</label>
                    <input id="expiry" type="text"
                           placeholder="12/28"
                           maxlength="5"
                           class="border block  rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">
                </div>
                <div>
                    <label for="cvv">CVV</label>
                    <input id="cvv" type="password"
                           maxlength="3"
                           placeholder="***"
                           class="border block  rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">
                </div>


            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
            <button class="px-4 py-2 text-sm rounded-md bg-gray-200 hover:bg-gray-300 transition">
                Cancel
            </button>
            <button  type="submit" form="payment-form" class="px-4 py-2 text-sm rounded-md bg-emerald-600 text-white hover:bg-emerald-700 transition">
                Add
            </button>
        </div>

    </div>



    <div class="rounded-xl bg-white/90 backdrop-blur-md shadow-xl border border-white/40 overflow-hidden flex flex-col h-full">


        <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
            <h2 class="text-lg font-semibold text-gray-800">Withdraw to your bank account</h2>
            <span class="text-sm px-2 py-1 rounded-md bg-emerald-100 text-emerald-700">
      Instant
    </span>
        </div>

        <div class="px-6 py-4 text-gray-600 flex-1">

            <form method="post" class="mb-4" id="withdraw-form" th:action="@{/app/withdraw-cash}" >
                <label for="withdraw-amount">Amount to withdraw</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                     $
                     </span>
                    <input id="withdraw-amount"
                           type="number"
                           th:name="amountToWithdraw"

                           required
                           placeholder="0.00"
                           class="pl-8 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none border w-[30%] block rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">

                </div>
                <div class="mt-4">
                    <label for="withdraw-iban">Destination IBAN</label>
                    <input id="withdraw-iban" type="text"
                           placeholder="FR76 3000 6000 0112 3456 7890 189"
                           required
                           class="border w-[80%] block rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">
                </div>
            </form>

        </div>

        <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
            <button class="px-4 py-2 text-sm rounded-md bg-gray-200 hover:bg-gray-300 transition">
                Cancel
            </button>
            <button  type="submit" form="withdraw-form" class="px-4 py-2 text-sm rounded-md bg-emerald-600 text-white hover:bg-emerald-700 transition">
                Withdraw
            </button>
        </div>

    </div>
    </div>
</main>

</body>
</html>
