<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Sign up</title>
  <script src="https://cdn.tailwindcss.com"></script>


</head>
<body class="">
<h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight ">Sign up to register an account</h2>
<div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">

  <form  action="#" th:action="@{/auth/signup}" method="post" class="space-y-6" th:object="${signUpForm}">
    <div>
      <label for="email" class="block text-sm/6 font-medium " >Email address</label>
      <div class="mt-2">
        <input  id="email" type="email" name="email" required autofocus th:field="*{email}" autocomplete="email" class="border block w-full rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-800 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
        <p class="text-red-500 " th:if="${emailAlreadyExist}" >Email already exists</p>


      </div>
    </div>
    <div>
      <label for="firstName" class="block text-sm/6 font-medium" >First Name</label>
      <div class="mt-2">
        <input id="firstName" type="text" name="firstName"  th:field="*{firstName}" class="border block w-full rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-800 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />

      </div>
    </div>
    <div>
      <label for="lastName" class="block text-sm/6 font-medium">Last Name</label>
      <div class="mt-2">
        <input id="lastName" type="text" name="lastName" th:field="*{lastName}"   class="border block w-full rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-800 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />

      </div>
    </div>
    <div>
      <div class="flex items-center justify-between">
        <label for="password" class="block text-sm/6 font-medium">Password</label>
        <div class="text-sm">
          <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300">Forgot password?</a>
        </div>
      </div>
      <div class="mt-2">
        <input id="password" type="password" name="password" th:field="*{password}" required autocomplete="current-password" class=" border block w-full rounded-md bg-white/5 px-3 py-1.5 text-base  outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-900 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />

      </div>
    </div>

    <div>
      <button type="submit" class="flex w-full justify-center rounded-md bg-green-500 text-white px-3 py-1.5 text-sm/6 font-semibold  hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Sign in</button>
    </div>
  </form>
  <p class="mt-10 text-center text-sm/6 text-gray-400">
    Already have an account ?
    <a href="/auth/signin" class="font-semibold text-indigo-400 hover:text-indigo-300">Sign in</a>
  </p>



</div>





</body>
</html>
