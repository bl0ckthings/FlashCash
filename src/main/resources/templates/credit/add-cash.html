<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add cash</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="w-full">
<header class="flex justify-between items-center px-5 bg-gradient-to-r bg-gradient-to-r from-lime-400 to-emerald-400">
    <figure class="h-[100px] ">
        <img src="/assets/logo.png" class="h-[100px] ">
    </figure>
    <nav class="flex gap-4">
        <a class="text-lg px-4 py-2 rounded-lg border border-white/40 text-white
     backdrop-blur-sm bg-white/10
     hover:bg-white hover:text-emerald-600
     hover:shadow-lg hover:scale-105
     transition-all duration-200 cursor-pointer">
            Home
        </a>

        <a class="text-lg px-4 py-2 rounded-lg border border-white/40 text-white
     backdrop-blur-sm bg-white/10
     hover:bg-white hover:text-emerald-600
     hover:shadow-lg hover:scale-105
     transition-all duration-200 cursor-pointer">
            Transfers
        </a>

        <a class="text-lg px-4 py-2 rounded-lg border border-white/40 text-white
     backdrop-blur-sm bg-white/10
     hover:bg-white hover:text-emerald-600
     hover:shadow-lg hover:scale-105
     transition-all duration-200 cursor-pointer">
            Contact
        </a>

        <a class="text-lg px-4 py-2 rounded-lg border border-white/40 text-white
     backdrop-blur-sm bg-white/10
     hover:bg-red-500 hover:text-white hover:border-red-500
     hover:shadow-lg hover:scale-105
     transition-all duration-200 cursor-pointer">
            Sign out
        </a>
    </nav>


</header>
<main>
    <h1 class="text-center text-4xl font-mono" >Add Cash</h1>
    <div class="max-w-md mx-auto mt-20 rounded-xl bg-white/90 backdrop-blur-md shadow-xl border border-white/40 overflow-hidden">


        <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
            <h2 class="text-lg font-semibold text-gray-800">Credit your account with a credit card</h2>
            <span class="text-sm px-2 py-1 rounded-md bg-emerald-100 text-emerald-700">
      Secure
    </span>
        </div>

        <!-- Content -->
        <div class="px-6 py-4 text-gray-600 flex gap-4 flex-col">

            <label for="card-number">Card Holder Name</label>
            <input id="card-number" type="text" class="border w-[80%] block  rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-800 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">
            <label for="card-number">Card Number</label>

            <input type="text" class="border w-full w-[80%]   block  rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-800 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">

            <div class="flex gap-2 mx-auto">
                <div>
                    <label for="expiry">Expiration Date</label>
                    <input id="expiry" type="text" class="border block  rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-800 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">
                </div>
                <div>
                    <label for="cvv">CVV</label>
                    <input id="cvv" type="text" class="border block  rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-800 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6">
                </div>


            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
            <button class="px-4 py-2 text-sm rounded-md bg-gray-200 hover:bg-gray-300 transition">
                Cancel
            </button>
            <button class="px-4 py-2 text-sm rounded-md bg-emerald-600 text-white hover:bg-emerald-700 transition">
                Add
            </button>
        </div>

    </div>
</main>

</body>
</html>
